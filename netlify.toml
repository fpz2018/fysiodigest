[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["pdf-parse"]

[[scheduled-functions]]
  name = "verwerk-rss-scheduled"
  cron = "0 6 * * 1"

[[scheduled-functions]]
  name = "verstuur-digest-scheduled"
  cron = "0 7 * * 1"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
